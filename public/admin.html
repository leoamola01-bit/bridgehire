<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .login {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }

        .status-rejected {
            background: #fee2e2;
            color: #dc2626;
        }

        .action-buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-approve {
            background: #10b981;
            color: white;
        }

        .btn-approve:hover {
            background: #059669;
        }

        .btn-reject {
            background: #ef4444;
            color: white;
        }

        .btn-reject:hover {
            background: #dc2626;
        }

        .btn-notes {
            background: #6b7280;
            color: white;
        }

        .btn-notes:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>

<h1>Admin Dashboard</h1>

<div class="login">
    <input type="password" id="adminKey" placeholder="Enter Admin Key">
    <button onclick="loadApplications()">Load Applications</button>
</div>

<div id="applications"></div>

<script>
const getAPIBase = () => {
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        return (window.location.port === '3000' || window.location.port === '5500') 
            ? ''
            : 'http://127.0.0.1:3000';
    }
    return `${window.location.protocol}//${window.location.host}`;
};
const API_BASE = getAPIBase();

async function loadApplications() {
    const key = document.getElementById('adminKey').value;

    if (!key) {
        alert("Enter admin key");
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/admin/applications`, {
            headers: {
                "Authorization": key.trim()
            }
        });

        const data = await res.json();

        if (!res.ok) {
            console.error('Admin authentication error:', data);
            alert('Error: ' + (data.error || 'Failed to authenticate. Check your admin key.'));
            return;
        }

        const container = document.getElementById('applications');
        container.innerHTML = "";

        data.applications.forEach(app => {
            const div = document.createElement('div');
            div.className = 'card';

            const info = app.data;

            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3>${info.personalDetails.fullName}</h3>
                    <div class="status-badge status-${app.status || app.data.status || 'pending'}">${app.status || app.data.status || 'pending'}</div>
                </div>
                <p><b>Application ID:</b> ${app.id}</p>
                <p><b>Application Type:</b> ${info.type}</p>

                <div class="section">
                    <h4>Personal Details</h4>
                    <p><b>DOB:</b> ${info.personalDetails.dob || ''}</p>
                    <p><b>Gender:</b> ${info.personalDetails.gender || ''}</p>
                    <p><b>Marital Status:</b> ${info.personalDetails.maritalStatus || ''}</p>
                    <p><b>Nationality:</b> ${info.personalDetails.nationality || ''}</p>
                </div>

                <div class="section">
                    <h4>Contact</h4>
                    <p><b>Email:</b> ${info.contactDetails.email}</p>
                    <p><b>Phone:</b> ${info.contactDetails.phone}</p>
                    <p><b>Address:</b> ${info.contactDetails.address}</p>
                </div>

                ${info.type === 'job' ? `
                <div class="section">
                    <h4>Work Details</h4>
                    <p><b>Job Category:</b> ${info.workDetails?.jobCategory || ''}</p>
                    <p><b>Experience:</b> ${info.workDetails?.experience || ''} years</p>
                    <p><b>Skills:</b> ${info.workDetails?.skills || ''}</p>
                </div>
                ` : `
                <div class="section">
                    <h4>Education</h4>
                    <p><b>Desired Course:</b> ${info.education?.desiredCourse || ''}</p>
                </div>
                `}

                <div class="section">
                    <h4>Files</h4>
                    <div class="files">
                        ${renderFiles(info.files)}
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-approve" onclick="updateStatus('${app.id}', 'approved')">
                        <i class="fas fa-check"></i> Approve
                    </button>
                    <button class="btn btn-reject" onclick="updateStatus('${app.id}', 'rejected')">
                        <i class="fas fa-times"></i> Reject
                    </button>
                    <button class="btn btn-notes" onclick="addNotes('${app.id}')">
                        <i class="fas fa-sticky-note"></i> Add Notes
                    </button>
                </div>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        console.error('Failed to load applications:', err);
        alert("Failed to load applications: " + err.message);
    }
}

function renderFiles(files) {
    let html = "";

    if (!files) return "No files";

    for (let key in files) {
        files[key].forEach(file => {
            html += `<a href="${file.url}" target="_blank">${file.originalname}</a>`;
        });
    }

    return html || "No files uploaded";
}

async function updateStatus(applicationId, status) {
    const key = document.getElementById('adminKey').value;

    if (!key) {
        alert("Enter admin key first");
        return;
    }

    if (!confirm(`Are you sure you want to ${status} this application?`)) {
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/admin/applications/${applicationId}/status`, {
            method: 'POST',
            headers: {
                "Authorization": key.trim(),
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ status })
        });

        const data = await res.json();

        if (res.ok) {
            alert(`Application ${status} successfully!`);
            loadApplications(); // Reload the applications list
        } else {
            console.error('Status update error:', data);
            alert('Error: ' + (data.error || 'Failed to update application status'));
        }
    } catch (err) {
        console.error('Failed to update status:', err);
        alert("Failed to update status: " + err.message);
    }
}

function addNotes(applicationId) {
    const notes = prompt("Enter notes for this application:");
    if (notes !== null && notes.trim()) {
        updateStatusWithNotes(applicationId, notes);
    }
}

async function updateStatusWithNotes(applicationId, notes) {
    const key = document.getElementById('adminKey').value;

    if (!key) {
        alert("Enter admin key first");
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/admin/applications/${applicationId}/status`, {
            method: 'POST',
            headers: {
                "Authorization": key.trim(),
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ status: 'pending', notes })
        });

        const data = await res.json();

        if (res.ok) {
            alert("Notes added successfully!");
            loadApplications(); // Reload the applications list
        } else {
            alert(data.error);
        }
    } catch (err) {
        alert("Failed to add notes");
    }
}
</script>

</body>
</html>
